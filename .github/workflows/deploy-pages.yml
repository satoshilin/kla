name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stamp deploy version
        run: |
          DEPLOY_TIME="$(date -u +%Y%m%d%H%M%S)"
          find . -type f \( -name "*.html" -o -name "*.js" \) -not -path "./.git/*" -not -path "./.github/*" -print0 | xargs -0 sed -i "s/__DEPLOY_TIME__/${DEPLOY_TIME}/g"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
