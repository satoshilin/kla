<!doctype html>

<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KLA Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="deploy-version.js?v=__DEPLOY_TIME__"></script>
  </head>
  <body class="m-0 min-h-screen bg-gradient-to-b from-[#2B5FB5] to-[#4C089B]">
    <main class="mx-auto flex aspect-[9/16] w-full max-w-[56.25dvh] max-h-[100dvh] flex-col overflow-hidden">
      <header class="flex h-[13%] items-center justify-center bg-[#109BD4]">
        <img src="svg/kla_logo.svg" alt="KLA logo" class="h-[48%] w-auto" />
      </header>

      <section class="relative h-[32%] overflow-hidden bg-gradient-to-b from-[#2B5FB5] to-[#4C089B]">
        <video
          id="intro-video"
          class="block h-full w-full scale-[1.06] select-none object-cover object-center"
          autoplay
          muted
          playsinline
          disablepictureinpicture
          disableremoteplayback
          controlslist="nodownload nofullscreen noplaybackrate noremoteplayback"
          preload="auto"
        ></video>
        <div id="intro-playback" class="absolute inset-x-4 bottom-3 z-10 hidden select-none rounded-md bg-black/55 px-3 py-2 text-white">
          <div id="intro-playback-track" class="h-1.5 w-full cursor-pointer overflow-hidden rounded-full bg-white/30">
            <div id="intro-playback-fill" class="h-full w-0 pointer-events-none bg-white"></div>
          </div>
        </div>
        <button
          id="unmute-btn"
          type="button"
          class="absolute right-3 top-3 z-20 rounded-md bg-black/70 px-6 py-3 text-base font-semibold text-white"
        >
          開啟聲音 🔊
        </button>
      </section>

      <section class="flex h-[55%] items-center justify-center bg-gradient-to-b from-[#2B5FB5] to-[#4C089B] px-[6%] py-[5%]">
        <div class="grid w-[72%] grid-cols-2 gap-x-[10%] gap-y-[9%]">
          <a href="jobopening.html" class="block">
            <img src="svg/btn_jobopening.svg" alt="Job Openings" class="h-auto w-full" />
          </a>
          <a href="copanyprospects.html" class="block">
            <img src="svg/btn_compnayprospects.svg" alt="Company Prospects" class="h-auto w-full" />
          </a>
          <a href="https://www.facebook.com/kla.taiwan" class="block">
            <img src="svg/btn_facebook.svg" alt="Facebook" class="h-auto w-full" />
          </a>
          <a href="experiencesharing.html" class="block">
            <img src="svg/btn_experiencesharing.svg" alt="Experience Sharing" class="h-auto w-full" />
          </a>
        </div>
      </section>
    </main>
    <script>
      const introVideo = document.getElementById("intro-video");
      const unmuteBtn = document.getElementById("unmute-btn");
      const playbackPanel = document.getElementById("intro-playback");
      const playbackTrack = document.getElementById("intro-playback-track");
      const playbackFill = document.getElementById("intro-playback-fill");
      const introVideos = ["introduction.mp4", "introduction2.mp4", "introduction3.mp4"];
      const unmuteEnabledVideos = new Set(["introduction.mp4", "introduction2.mp4"]);
      const videoQueueStorageKey = "kla-intro-video-queue-v1";
      const playbackAutoHideDelayMs = 3000;

      const shuffleVideos = () => {
        const shuffled = [...introVideos];

        for (let i = shuffled.length - 1; i > 0; i -= 1) {
          const randomIndex = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[i]];
        }

        return shuffled;
      };

      const getNextVideoSource = () => {
        const storedQueue = sessionStorage.getItem(videoQueueStorageKey);
        let queue = storedQueue ? storedQueue.split("|").filter(Boolean) : [];
        const isQueueValid = queue.every((video) => introVideos.includes(video));

        if (!isQueueValid) {
          queue = [];
        }

        if (queue.length === 0) {
          queue = shuffleVideos();
        }

        const [nextVideo, ...remainingQueue] = queue;
        sessionStorage.setItem(videoQueueStorageKey, remainingQueue.join("|"));

        return nextVideo;
      };

      if (introVideo instanceof HTMLVideoElement) {
        introVideo.controls = false;
        let currentIntroVideoSource = "";
        let playbackHideTimeoutId = null;

        const schedulePlaybackHide = () => {
          if (playbackHideTimeoutId !== null) window.clearTimeout(playbackHideTimeoutId);
          playbackHideTimeoutId = window.setTimeout(() => {
            if (playbackPanel instanceof HTMLElement) playbackPanel.classList.add("hidden");
            playbackHideTimeoutId = null;
          }, playbackAutoHideDelayMs);
        };

        const showPlayback = () => {
          if (playbackPanel instanceof HTMLElement) playbackPanel.classList.remove("hidden");
          schedulePlaybackHide();
        };

        const updatePlayback = () => {
          if (!(playbackFill instanceof HTMLElement)) return;
          const duration = Number.isFinite(introVideo.duration) && introVideo.duration > 0 ? introVideo.duration : 0;
          const currentTime = Number.isFinite(introVideo.currentTime) && introVideo.currentTime > 0 ? introVideo.currentTime : 0;
          const safeCurrentTime = duration > 0 ? Math.min(currentTime, duration) : currentTime;
          const progress = duration > 0 ? (safeCurrentTime / duration) * 100 : 0;

          playbackFill.style.width = `${progress}%`;
        };

        const updateUnmuteButtonVisibility = () => {
          if (!(unmuteBtn instanceof HTMLButtonElement)) return;
          const shouldShowUnmute = introVideo.muted && unmuteEnabledVideos.has(currentIntroVideoSource);
          unmuteBtn.classList.toggle("hidden", !shouldShowUnmute);
        };

        const seekByClientX = (clientX) => {
          if (!(playbackTrack instanceof HTMLElement)) return;
          const duration = Number.isFinite(introVideo.duration) && introVideo.duration > 0 ? introVideo.duration : 0;
          if (duration <= 0) return;

          const trackRect = playbackTrack.getBoundingClientRect();
          if (trackRect.width <= 0) return;

          const ratio = Math.min(Math.max((clientX - trackRect.left) / trackRect.width, 0), 1);
          introVideo.currentTime = duration * ratio;
          updatePlayback();
          introVideo.play().catch((error) => {
            console.error("Video resume after seek failed:", error);
          });
        };

        introVideo.addEventListener("pause", () => {
          if (!introVideo.ended) {
            introVideo.play().catch((error) => {
              console.error("Video resume after pause failed:", error);
            });
          }
        });
        introVideo.addEventListener("timeupdate", updatePlayback);
        introVideo.addEventListener("loadedmetadata", updatePlayback);
        introVideo.addEventListener("durationchange", updatePlayback);
        introVideo.addEventListener("click", showPlayback);
        if (playbackTrack instanceof HTMLElement) {
          playbackTrack.addEventListener("click", (event) => {
            showPlayback();
            seekByClientX(event.clientX);
          });
        }
        if (unmuteBtn instanceof HTMLButtonElement) {
          unmuteBtn.addEventListener("click", () => {
            introVideo.muted = false;
            introVideo.volume = 1;
            introVideo.play().catch((error) => {
              console.error("Video unmute play failed:", error);
            });
            updateUnmuteButtonVisibility();
          });
        }

        const playCurrentVideo = () => {
          currentIntroVideoSource = getNextVideoSource();
          introVideo.src = currentIntroVideoSource;
          introVideo.load();
          updatePlayback();
          updateUnmuteButtonVisibility();
          introVideo.play().catch((error) => {
            console.error("Video autoplay failed:", error);
          });
        };

        introVideo.addEventListener("ended", () => {
          playCurrentVideo();
        });

        playCurrentVideo();
      }
    </script>
  </body>
</html>
