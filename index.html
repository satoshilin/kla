<!doctype html>

<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KLA Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="deploy-version.js?v=__DEPLOY_TIME__"></script>
  </head>
  <body class="m-0 min-h-screen bg-gradient-to-b from-[#2B5FB5] to-[#4C089B]">
    <main class="mx-auto flex aspect-[9/16] w-full max-w-[56.25dvh] max-h-[100dvh] flex-col overflow-hidden">
      <header class="flex h-[13%] items-center justify-center bg-[#109BD4]">
        <img src="svg/kla_logo.svg" alt="KLA logo" class="h-[48%] w-auto" />
      </header>

      <section class="relative h-[32%] bg-gradient-to-b from-[#2B5FB5] to-[#4C089B]">
        <video id="intro-video" class="h-full w-full object-cover" autoplay muted playsinline preload="auto"></video>
        <button
          id="unmute-btn"
          type="button"
          class="absolute bottom-3 right-3 rounded-md bg-black/70 px-6 py-3 text-base font-semibold text-white"
        >
          開啟聲音 🔊
        </button>
      </section>

      <section class="flex h-[55%] items-center justify-center bg-gradient-to-b from-[#2B5FB5] to-[#4C089B] px-[6%] py-[5%]">
        <div class="grid w-[72%] grid-cols-2 gap-x-[10%] gap-y-[9%]">
          <a href="jobopening.html" class="block">
            <img src="svg/btn_jobopening.svg" alt="Job Openings" class="h-auto w-full" />
          </a>
          <a href="copanyprospects.html" class="block">
            <img src="svg/btn_compnayprospects.svg" alt="Company Prospects" class="h-auto w-full" />
          </a>
          <a href="https://www.kla.com/zh-hant" class="block">
            <img src="svg/btn_officialwebsite.svg" alt="Official Website" class="h-auto w-full" />
          </a>
          <a href="experiencesharing.html" class="block">
            <img src="svg/btn_experiencesharing.svg" alt="Experience Sharing" class="h-auto w-full" />
          </a>
        </div>
      </section>
    </main>
    <script>
      const introVideo = document.getElementById("intro-video");
      const unmuteBtn = document.getElementById("unmute-btn");
      const introVideos = ["introduction.mp4", "introduction2.mp4", "introduction3.mp4"];
      let currentVideoIndex = 0;

      if (introVideo instanceof HTMLVideoElement) {
        const playCurrentVideo = () => {
          introVideo.src = introVideos[currentVideoIndex];
          introVideo.load();
          introVideo.play().catch((error) => {
            console.error("Video autoplay failed:", error);
          });
        };

        introVideo.addEventListener("ended", () => {
          currentVideoIndex = (currentVideoIndex + 1) % introVideos.length;
          playCurrentVideo();
        });

        playCurrentVideo();
      }

      if (introVideo instanceof HTMLVideoElement && unmuteBtn instanceof HTMLButtonElement) {
        unmuteBtn.addEventListener("click", () => {
          introVideo.muted = false;
          introVideo.volume = 1;
          introVideo.play().catch((error) => {
            console.error("Video unmute play failed:", error);
          });
          unmuteBtn.classList.add("hidden");
        });
      }
    </script>
  </body>
</html>
